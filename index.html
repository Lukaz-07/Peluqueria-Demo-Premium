<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio Premium | Turnos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="peek-container">
        <header>
            <div class="brand-box">
                <h1>HAIR STUDIO</h1>
                <p class="brand-sub">DESIGN & PRECISION</p>
            </div>
        </header>

        <section class="section-peek">
            <h2 class="section-title">STYLE BOOK</h2>
            <div class="gallery-layout">
                <div class="img-wrapper">
                    <img src="https://images.unsplash.com/photo-1621605815971-fbc98d665033?w=500&q=80" alt="Estilo 1">
                </div>
                <div class="img-wrapper">
                    <img src="https://images.unsplash.com/photo-1599351431202-1e0f0137899a?w=500&q=80" alt="Estilo 2">
                </div>
            </div>
        </section>

        <section class="section-peek">
            <h2 class="section-title">RESERVA</h2>
            <form id="form-peek">
                <div class="input-container">
                    <input type="text" id="nombre" placeholder="NOMBRE COMPLETO" required>
                </div>
                
                <div class="input-container">
                    <input type="tel" id="whatsapp" placeholder="WHATSAPP (NÚMERO)" inputmode="numeric" oninput="this.value = this.value.replace(/[^0-9]/g, '')" required>
                </div>

                <div class="input-container">
                    <select id="servicio" required>
                        <option value="" disabled selected>CARGANDO SERVICIOS...</option>
                    </select>
                </div>

                <div class="grid-inputs">
                    <div class="input-container">
                        <input type="date" id="fecha" required>
                    </div>
                    <div class="input-container">
                        <select id="hora" required>
                            <option value="" disabled selected>HORA</option>
                            <option value="09:00 hs">09:00 hs</option>
                            <option value="10:00 hs">10:00 hs</option>
                            <option value="11:00 hs">11:00 hs</option>
                            <option value="16:00 hs">16:00 hs</option>
                            <option value="17:00 hs">17:00 hs</option>
                            <option value="18:00 hs">18:00 hs</option>
                        </select>
                    </div>
                </div>

                <button type="submit" class="btn-peek">CONFIRMAR TURNO</button>
            </form>
        </section>

        <section class="section-peek no-border">
            <h2 class="section-title">INFO</h2>
            <div class="info-box">
                <p>Marcial Candioti 3200, Santa Fe</p>
                <p class="hours">Mar a Sáb: 09:00 — 20:00 hs</p>
            </div>
            <div class="map-wrapper">
                <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d108709.60100788624!2d-60.77196016629988!3d-31.62569502759902!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x95b5a9adc40888e1%3A0x7d11f161f653a152!2sSanta%20Fe%2C%20Provincia%20de%20Santa%20Fe!5e0!3m2!1ses-419!2sar!4v1715000000000!5m2!1ses-419!2sar" width="100%" height="180" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
            </div>
        </section>

        <footer>
            <p>© 2026 HAIR STUDIO. DIGITAL SYSTEM BY LUCASM.</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
